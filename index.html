<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM File Visualizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1d23; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1350px; margin: 0 auto; }
        h1 { text-align: center; font-size: 1.6rem; margin-bottom: 6px; color: #fff; }
        .subtitle { text-align: center; color: #888; font-size: 0.9rem; margin-bottom: 20px; }
        /* Source picker (tabbed: GGUF / Ollama) */
        .source-picker { background: #22262e; border: 1px solid #2a2f3a; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .source-tabs { display: flex; border-bottom: 1px solid #2a2f3a; }
        .source-tab { flex: 1; padding: 12px 16px; background: none; border: none; border-bottom: 2px solid transparent; color: #888; cursor: pointer; font-size: 0.88rem; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s, color 0.15s; }
        .source-tab:hover { background: #262b35; color: #ccc; }
        .source-tab.active { background: #1e2530; color: #fff; border-bottom-color: #4a90d9; }
        .source-tab-panel { padding: 20px; }
        .upload-area { border: 2px dashed #444; border-radius: 10px; padding: 40px; text-align: center; background: #1e2530; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
        .upload-area:hover, .upload-area.drag-over { border-color: #4a90d9; background: #262b35; }
        .upload-area p { color: #888; margin-bottom: 12px; }
        .upload-area button { padding: 8px 20px; background: #4a90d9; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .upload-area button:hover { background: #3a7bc8; }
        #status { text-align: center; padding: 10px; color: #f0ad4e; font-size: 0.85rem; }
        .error { color: #d9534f !important; }

        /* Model summary */
        .model-summary { background: #22262e; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .model-summary h2 { font-size: 1.3rem; margin-bottom: 12px; color: #fff; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .summary-item { background: #2a2f3a; border-radius: 6px; padding: 10px; }
        .summary-item .label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .summary-item .value { display: block; font-size: 1rem; color: #fff; margin-top: 2px; font-weight: 600; }

        /* View tabs */
        .view-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
        .view-tab { padding: 8px 14px; background: #22262e; color: #aaa; border: 1px solid #3a3f4b; border-radius: 999px; cursor: pointer; font-size: 0.85rem; }
        .view-tab:hover { border-color: #4a90d9; color: #fff; }
        .view-tab.active { background: #283148; border-color: #4a90d9; color: #fff; cursor: default; }
        .view-panel { display: flex; flex-direction: column; gap: 16px; }

        /* Architecture view */
        .architecture-view { display: flex; flex-direction: column; gap: 14px; }
        .architecture-toolbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
        .toolbar-group { display: flex; gap: 8px; flex-wrap: wrap; }
        .toolbar-btn { padding: 7px 12px; background: #2a2f3a; border: 1px solid #3a3f4b; color: #ddd; border-radius: 6px; cursor: pointer; font-size: 0.8rem; }
        .toolbar-btn:hover { border-color: #4a90d9; color: #fff; }
        .architecture-legend { display: flex; flex-wrap: wrap; gap: 8px 12px; color: #999; font-size: 0.75rem; }
        .legend-item { display: inline-flex; align-items: center; gap: 6px; }
        .legend-swatch { width: 10px; height: 10px; border-radius: 999px; display: inline-block; }
        .architecture-canvas { background: #22262e; border: 1px solid #2a2f3a; border-radius: 10px; overflow: hidden; min-height: 420px; }
        .architecture-svg { display: block; width: 100%; background: linear-gradient(180deg, #20242c 0%, #1d2128 100%); touch-action: none; }
        .architecture-inspector { background: #22262e; border-radius: 10px; padding: 18px; }
        .architecture-inspector h3 { font-size: 1rem; color: #fff; margin-bottom: 12px; }
        .inspector-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 12px; }
        .inspector-card { background: #2a2f3a; border-radius: 8px; padding: 10px; }
        .inspector-card .label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
        .inspector-card .value { display: block; margin-top: 4px; color: #fff; font-weight: 600; }
        .inspector-note { color: #999; font-size: 0.85rem; }
        .subgroup-pills { display: flex; flex-wrap: wrap; gap: 8px; }
        .subgroup-pill { background: #2a2f3a; border: 1px solid #3a3f4b; border-radius: 999px; padding: 6px 10px; font-size: 0.78rem; color: #ddd; }
        .subgroup-pill strong { color: #fff; }
        .attn-detail-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; margin-top: 4px; }
        .attn-detail-table th { text-align: left; color: #7a8599; font-weight: 500; padding: 4px 8px; border-bottom: 1px solid #3a3f4b; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.3px; }
        .attn-detail-table td { padding: 5px 8px; color: #c6cfdd; border-bottom: 1px solid #2a2f3a; }
        .selected-head-card { background: #252c38; border: 1px solid #384356; border-radius: 10px; padding: 12px; margin-top: 10px; }
        .selected-head-card.placeholder { border-style: dashed; }
        .selected-head-header { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 8px; }
        .head-chip { display: inline-flex; align-items: center; padding: 4px 9px; border-radius: 999px; background: #2f3746; color: #eef3fb; font-size: 0.75rem; font-weight: 600; }
        .head-chip.secondary { background: #273a4f; color: #9fc7ff; }
        .selected-head-note { color: #9aa4b8; font-size: 0.82rem; line-height: 1.45; margin-bottom: 10px; }
        .head-detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; }
        .head-detail-item { background: #2a2f3a; border-radius: 8px; padding: 10px; }
        .head-detail-item span { display: block; font-size: 0.68rem; color: #888; text-transform: uppercase; letter-spacing: 0.45px; }
        .head-detail-item strong { display: block; margin-top: 4px; color: #fff; font-size: 0.86rem; line-height: 1.35; }
        .selected-head-decode { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
        .head-decode-meta { color: #9aa4b8; font-size: 0.78rem; line-height: 1.45; }
        .head-decode-status { border-radius: 8px; padding: 11px 12px; border: 1px solid #3a4658; background: #273140; display: flex; flex-direction: column; gap: 5px; }
        .head-decode-status strong { color: #eef3fb; font-size: 0.82rem; }
        .head-decode-status p { color: #a6b3c8; font-size: 0.78rem; line-height: 1.45; }
        .head-decode-status.loading { background: #283242; border-color: #435671; }
        .head-decode-status.unavailable { background: #312d23; border-color: #66553a; }
        .head-decode-status.error { background: #3a2628; border-color: #7a4347; }
        .head-warning-list { display: flex; flex-direction: column; gap: 6px; }
        .head-warning-item { background: #312d23; border: 1px solid #66553a; color: #d9c9a5; border-radius: 8px; padding: 8px 10px; font-size: 0.76rem; line-height: 1.4; }
        .head-heatmap-list { display: flex; flex-direction: column; gap: 12px; }
        .head-heatmap-panel { background: #202733; border: 1px solid #384356; border-radius: 10px; padding: 12px; }
        .head-heatmap-header { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
        .head-heatmap-header strong { display: block; color: #fff; font-size: 0.86rem; }
        .head-heatmap-header span { display: block; margin-top: 4px; color: #93a0b4; font-size: 0.75rem; }
        .head-heatmap-shape { color: #9fc7ff; font-size: 0.76rem; font-weight: 600; white-space: nowrap; }
        .head-stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 8px; margin-bottom: 10px; }
        .head-stat-card { background: #28313f; border-radius: 8px; padding: 8px 9px; }
        .head-stat-card span { display: block; font-size: 0.66rem; color: #8d99ad; text-transform: uppercase; letter-spacing: 0.4px; }
        .head-stat-card strong { display: block; margin-top: 4px; color: #fff; font-size: 0.8rem; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
        .head-heatmap-wrap { background: #151922; border: 1px solid #313b4d; border-radius: 8px; padding: 8px; overflow: auto; }
        .head-heatmap-canvas { display: block; width: 100%; height: auto; image-rendering: pixelated; }
        .head-heatmap-caption { margin-top: 8px; color: #8f9bb0; font-size: 0.74rem; line-height: 1.4; }
        .head-heatmap-pagination { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 8px 0; }
        .heatmap-page-btn { background: #2a3445; border: 1px solid #48576e; color: #c6cfdd; border-radius: 6px; padding: 5px 12px; font-size: 0.78rem; cursor: pointer; transition: background 0.15s; }
        .heatmap-page-btn:hover:not(:disabled) { background: #3a4a60; }
        .heatmap-page-btn:disabled { opacity: 0.35; cursor: default; }
        .heatmap-page-info { color: #9aa4b8; font-size: 0.76rem; white-space: nowrap; }

        /* Attention head connection diagram */
        .head-connection-section { margin: 12px 0 10px; padding: 12px; border-radius: 10px; background: #202733; border: 1px solid #313b4d; }
        .head-connection-section h5 { margin: 0 0 6px; color: #dfe7f3; font-size: 0.83rem; }
        .head-connection-note { margin: 0 0 10px; color: #8f9bb0; font-size: 0.76rem; line-height: 1.45; }
        .head-node { display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 10px 12px; border-radius: 10px; background: #293241; border: 1px solid #3a4659; color: #eef3fb; text-align: center; min-width: 126px; }
        .head-node strong { font-size: 0.79rem; color: #fff; }
        .head-node span { font-size: 0.72rem; color: #aab7ca; }
        .head-node small { font-size: 0.68rem; color: #7f8da3; }
        .head-node.input { margin: 0 auto; background: #26303c; }
        .head-node.projection { width: 100%; min-width: 0; }
        .head-projection-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 12px 0 14px; }
        .head-projection-lane { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 6px 6px 0; }
        .head-flow-arrow { display: flex; flex-direction: column; align-items: center; gap: 2px; color: #9fc7ff; font-size: 0.76rem; }
        .head-flow-arrow span { font-size: 0.95rem; line-height: 1; }
        .head-flow-arrow strong { font-size: 0.7rem; font-weight: 600; color: #9fc7ff; padding: 2px 7px; border-radius: 999px; background: rgba(85, 134, 196, 0.18); border: 1px solid rgba(121, 170, 235, 0.22); }
        .head-projection-caption { font-size: 0.72rem; color: #7f8da3; text-align: center; }
        .head-band-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(138px, 1fr)); gap: 10px; }
        .head-band { background: #1d2430; border: 1px solid #334051; border-radius: 12px; padding: 10px; }
        .head-band.selected { border-color: #71b7ff; box-shadow: 0 0 0 1px rgba(113,183,255,0.25) inset; }
        .head-band.related { border-color: #5e7fa6; }
        .head-band-header, .head-band-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .head-band-header strong { color: #fff; font-size: 0.78rem; }
        .head-band-header span, .head-band-meta span { color: #8f9bb0; font-size: 0.69rem; }
        .head-band-meta { margin-top: 4px; }
        .head-band-row, .head-band-kv { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 10px; }
        .head-band-bus { display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: 8px; color: #8db6e7; }
        .head-band-connector { width: 2px; height: 18px; background: linear-gradient(180deg, #7d8fa6 0%, #4a90d9 100%); border-radius: 999px; }
        .head-band-link-label { font-size: 0.68rem; color: #8db6e7; }

        /* HTML head grid */
        .head-grid-section { margin-top: 10px; }
        .head-grid-section h5 { font-size: 0.82rem; color: #c6cfdd; font-weight: 600; margin: 0 0 8px; }
        .head-grid-label { font-size: 0.76rem; color: #9aa4b8; margin: 8px 0 4px; }
        .head-grid { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
        .head-cell { width: 28px; height: 28px; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.68rem; font-weight: 600; color: #fff; cursor: pointer; border: 1.5px solid transparent; transition: border-color 0.15s, background 0.15s, opacity 0.15s; opacity: 0.88; padding: 0; appearance: none; -webkit-appearance: none; }
        .head-cell:hover { opacity: 1; border-color: #8db6e7; }
        .head-cell:focus-visible { outline: 2px solid #71b7ff; outline-offset: 2px; }
        .head-cell.q-head { background: #e6894a; }
        .head-cell.kv-head { background: #4a90d9; }
        .head-cell.mlp-head { background: #5ea65f; min-width: 42px; width: auto; padding: 0 10px; }
        .head-cell.moe-head { background: #b89d2b; min-width: 56px; width: auto; padding: 0 10px; }
        .head-cell.wo-head { background: #5b7bb8; min-width: 42px; width: auto; padding: 0 10px; }
        .head-cell.selected { border-color: #71b7ff; border-width: 2px; opacity: 1; box-shadow: 0 0 6px rgba(113,183,255,0.35); }
        .head-cell.related { border-color: #8db6e7; opacity: 0.96; }
        .head-grid-hint { font-size: 0.72rem; color: #6f7b90; margin-top: 2px; }

        /* Layer stack */
        .layer-stack { display: flex; flex-direction: column; gap: 3px; }
        .layer { background: #22262e; border-radius: 6px; overflow: hidden; }
        .layer-header { cursor: pointer; }
        .layer-bar { display: flex; align-items: center; padding: 10px 14px; min-height: 40px; border-radius: 6px; transition: opacity 0.15s; }
        .layer-bar:hover { opacity: 0.85; }
        .layer-label { font-weight: 600; font-size: 0.85rem; color: #fff; }
        .layer-params { margin-left: auto; font-size: 0.8rem; color: rgba(255,255,255,0.7); font-family: monospace; }
        .expand-icon { margin-left: 10px; font-size: 0.75rem; color: rgba(255,255,255,0.5); }

        /* Subgroups */
        .layer-detail { padding: 4px 10px 10px; display: flex; flex-direction: column; gap: 2px; }
        .subgroup { border-radius: 4px; overflow: hidden; }
        .subgroup-bar { display: flex; align-items: center; padding: 7px 12px; border-radius: 4px; cursor: pointer; transition: opacity 0.15s; }
        .subgroup-bar:hover { opacity: 0.85; }
        .sg-label { font-size: 0.8rem; font-weight: 500; color: #fff; }
        .sg-params { margin-left: auto; font-size: 0.75rem; color: rgba(255,255,255,0.6); font-family: monospace; }

        /* Tensor list */
        .tensor-list { padding: 4px 8px 6px; }
        .tensor-item { display: flex; gap: 12px; align-items: center; padding: 3px 8px; font-size: 0.75rem; font-family: monospace; color: #aaa; border-bottom: 1px solid #2a2f3a; }
        .tensor-item:last-child { border-bottom: none; }
        .tensor-name { flex: 1; color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tensor-shape { color: #6abf69; }
        .tensor-type { color: #e6894a; min-width: 50px; text-align: right; }
        .tensor-mem { color: #4ad9c7; min-width: 60px; text-align: right; font-size: 0.7rem; }

        /* Attention Geometry */
        .attn-geometry { display: flex; align-items: center; gap: 6px; padding: 8px 0 2px; flex-wrap: wrap; }
        .attn-geo-item { font-size: 0.85rem; color: #ccc; }
        .attn-geo-item strong { color: #e6894a; }
        .attn-geo-sep { color: #555; font-size: 0.8rem; }

        /* Dataflow Mini-Diagram */
        .dataflow { display: flex; align-items: center; gap: 2px; padding: 8px 4px; overflow-x: auto; flex-wrap: wrap; }
        .df-node { display: inline-block; padding: 3px 8px; border-radius: 4px; background: #2a3040; color: #ccc; font-size: 0.72rem; font-family: monospace; white-space: nowrap; }
        .df-residual { background: #3a2a20; color: #e6894a; font-weight: bold; }
        .df-arrow { color: #555; font-size: 0.7rem; }

        /* Quantization Breakdown */
        .quant-breakdown { padding: 6px 0; }
        .quant-bar { display: flex; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 4px; }
        .quant-segment { min-width: 2px; transition: opacity 0.15s; }
        .quant-segment:hover { opacity: 0.7; }
        .quant-legend { display: flex; flex-wrap: wrap; gap: 6px 10px; }
        .quant-label { font-size: 0.7rem; color: #999; display: flex; align-items: center; gap: 3px; }
        .quant-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

        /* Shape Diagram */
        .shape-diagram { padding: 6px 0; display: flex; flex-direction: column; gap: 3px; }
        .shape-row { display: flex; align-items: center; gap: 8px; }
        .shape-name { font-size: 0.7rem; color: #888; font-family: monospace; min-width: 80px; text-align: right; }
        .shape-rect { background: #2a3a50; border-radius: 3px; padding: 2px 8px; min-height: 18px; display: flex; align-items: center; }
        .shape-dims { font-size: 0.68rem; color: #6abf69; font-family: monospace; white-space: nowrap; }

        .hidden { display: none !important; }

        /* Ollama picker */
        .ollama-section { background: #22262e; border-radius: 10px; padding: 20px; margin-bottom: 20px; }
        .ollama-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .ollama-header h3 { font-size: 0.95rem; color: #fff; margin: 0; }
        .ollama-badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; background: #2a5a2a; color: #6abf69; font-weight: 600; }
        .ollama-badge.offline { background: #5a2a2a; color: #d9534f; }
        .ollama-models { display: flex; flex-wrap: wrap; gap: 8px; }
        .ollama-model-card { background: #2a2f3a; border: 1px solid #3a3f4b; border-radius: 8px; padding: 10px 14px; cursor: pointer; transition: border-color 0.2s, background 0.2s; min-width: 180px; flex: 0 1 auto; }
        .ollama-model-card:hover { border-color: #4a90d9; background: #2f3544; }
        .ollama-model-card.selected { border-color: #4a90d9; background: #283148; }
        .ollama-model-name { font-weight: 600; font-size: 0.85rem; color: #fff; margin-bottom: 4px; }
        .ollama-model-meta { font-size: 0.7rem; color: #888; display: flex; gap: 8px; }
        .ollama-model-meta span { display: inline-flex; align-items: center; gap: 3px; }
        .ollama-empty { color: #666; font-size: 0.85rem; font-style: italic; }
        .divider { text-align: center; color: #555; font-size: 0.8rem; margin: 4px 0 16px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>LLM Visualizer</h1>
        <p class="subtitle">Visualize the internal structure of LLM models</p>

        <div class="source-picker">
            <div class="source-tabs">
                <button class="source-tab active" id="tabBtnGguf">📁 GGUF File</button>
                <button class="source-tab" id="tabBtnOllama">🦙 Ollama <span class="ollama-badge" id="ollamaBadge">checking…</span></button>
            </div>
            <div class="source-tab-panel" id="tabGguf">
                <div class="upload-area" id="dropArea">
                    <p>Drag & drop a <strong>.gguf</strong> file (or symlink) here, or click to browse</p>
                    <input type="file" id="fileInput" style="display:none">
                    <button id="browseBtn">Select GGUF File</button>
                </div>
            </div>
            <div class="source-tab-panel hidden" id="tabOllama">
                <div class="ollama-models" id="ollamaModels">
                    <span class="ollama-empty">Detecting Ollama…</span>
                </div>
            </div>
        </div>

        <div id="status"></div>
        <div id="visualization"></div>
    </div>

    <script type="module">
        import { parseGGUF } from './src/parsers/gguf.js';
        import { analyzeModel } from './src/model/analyzer.js';
        import { renderModelView } from './src/viz/app-view.js';
        import { OllamaClient } from './src/ollama/client.js';
        import { adaptOllamaModel } from './src/model/ollama-adapter.js';

        const dropArea = document.getElementById('dropArea');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const viz = document.getElementById('visualization');
        const ollamaBadge = document.getElementById('ollamaBadge');
        const ollamaModelsEl = document.getElementById('ollamaModels');

        // --- Source picker tabs ---
        const tabBtnGguf = document.getElementById('tabBtnGguf');
        const tabBtnOllama = document.getElementById('tabBtnOllama');
        const tabGguf = document.getElementById('tabGguf');
        const tabOllama = document.getElementById('tabOllama');

        function switchTab(tab) {
            const isGguf = tab === 'gguf';
            tabBtnGguf.classList.toggle('active', isGguf);
            tabBtnOllama.classList.toggle('active', !isGguf);
            tabGguf.classList.toggle('hidden', !isGguf);
            tabOllama.classList.toggle('hidden', isGguf);
        }
        tabBtnGguf.addEventListener('click', () => switchTab('gguf'));
        tabBtnOllama.addEventListener('click', () => switchTab('ollama'));

        const ollama = new OllamaClient();
        const appState = {
            model: null,
            activeView: 'architecture',
            selectedLayerIndex: null,
            selectedHead: null,
            rowPage: 0,
            viewTransforms: { architecture: null },
        };

        function renderCurrentModel(preserveScroll = false) {
            if (!appState.model) return;
            const scrollY = preserveScroll ? window.scrollY : null;
            renderModelView(viz, appState.model, {
                activeView: appState.activeView,
                selectedLayerIndex: appState.selectedLayerIndex,
                selectedHead: appState.selectedHead,
                rowPage: appState.rowPage,
                transform: appState.viewTransforms.architecture,
                onInvalidate: () => renderCurrentModel(true),
                onViewChange: (viewId) => {
                    appState.activeView = viewId;
                    renderCurrentModel();
                },
                onSelectLayer: (layerIndex) => {
                    appState.selectedLayerIndex = appState.selectedLayerIndex === layerIndex ? null : layerIndex;
                    appState.selectedHead = null;
                    appState.rowPage = 0;
                    renderCurrentModel(true);
                },
                onSelectHead: (headSelection) => {
                    const sameSelection = appState.selectedHead
                        && appState.selectedHead.kind === headSelection?.kind
                        && appState.selectedHead.index === headSelection?.index;
                    appState.selectedHead = sameSelection ? null : headSelection;
                    appState.rowPage = 0;
                    renderCurrentModel(true);
                },
                onRowPageChange: (page) => {
                    appState.rowPage = page;
                    renderCurrentModel(true);
                },
                onTransformChange: (transform) => {
                    appState.viewTransforms.architecture = transform;
                },
            });
            if (scrollY != null) {
                window.scrollTo({ top: scrollY, behavior: 'instant' });
            }
        }

        function showModel(model) {
            appState.model = model;
            appState.selectedLayerIndex = null;
            appState.selectedHead = null;
            appState.rowPage = 0;
            appState.viewTransforms.architecture = null;
            renderCurrentModel();
        }

        // --- Ollama integration ---
        async function initOllama() {
            const available = await ollama.isAvailable();
            if (!available) {
                ollamaBadge.textContent = 'offline';
                ollamaBadge.className = 'ollama-badge offline';
                ollamaModelsEl.innerHTML = '<span class="ollama-empty">Ollama not detected. Start Ollama to see your models here.</span>';
                return;
            }

            ollamaBadge.textContent = 'connected';
            ollamaBadge.className = 'ollama-badge';

            try {
                const models = await ollama.listModels();
                if (models.length === 0) {
                    ollamaModelsEl.innerHTML = '<span class="ollama-empty">No models downloaded. Run <code>ollama pull</code> to get started.</span>';
                    return;
                }
                renderModelCards(models);
            } catch (err) {
                ollamaModelsEl.innerHTML = `<span class="ollama-empty">Error loading models: ${err.message}</span>`;
            }
        }

        function formatSize(bytes) {
            if (bytes >= 1e9) return (bytes / 1e9).toFixed(1) + ' GB';
            if (bytes >= 1e6) return (bytes / 1e6).toFixed(0) + ' MB';
            return bytes + ' B';
        }

        function renderModelCards(models) {
            ollamaModelsEl.innerHTML = '';
            for (const m of models) {
                const card = document.createElement('div');
                card.className = 'ollama-model-card';
                card.innerHTML = `
                    <div class="ollama-model-name">${m.name}</div>
                    <div class="ollama-model-meta">
                        <span>${m.parameterSize}</span>
                        <span>${m.quantizationLevel}</span>
                        <span>${formatSize(m.size)}</span>
                    </div>
                `;
                card.addEventListener('click', () => loadOllamaModel(m.name, card));
                ollamaModelsEl.appendChild(card);
            }
        }

        async function loadOllamaModel(modelName, card) {
            // Deselect all cards, select this one
            ollamaModelsEl.querySelectorAll('.ollama-model-card').forEach(c => c.classList.remove('selected'));
            card.classList.add('selected');

            status.textContent = `Loading ${modelName} from Ollama...`;
            status.className = '';
            viz.innerHTML = '';

            try {
                const showData = await ollama.showModel(modelName);
                status.textContent = 'Analyzing model structure...';
                const model = adaptOllamaModel(modelName, showData);
                status.textContent = '';
                showModel(model);
            } catch (err) {
                status.textContent = `Error: ${err.message}`;
                status.className = 'error';
                console.error(err);
            }
        }

        // Kick off Ollama detection
        initOllama();

        // --- File upload (existing) ---
        document.getElementById('browseBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            fileInput.click();
        });
        dropArea.addEventListener('click', () => fileInput.click());

        ['dragenter','dragover','dragleave','drop'].forEach(e => dropArea.addEventListener(e, ev => { ev.preventDefault(); ev.stopPropagation(); }));
        ['dragenter','dragover'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.add('drag-over')));
        ['dragleave','drop'].forEach(e => dropArea.addEventListener(e, () => dropArea.classList.remove('drag-over')));

        dropArea.addEventListener('drop', e => processFile(e.dataTransfer.files[0]));
        fileInput.addEventListener('change', () => { if (fileInput.files[0]) processFile(fileInput.files[0]); });

        async function processFile(file) {
            if (!file) return;

            // Deselect any Ollama card
            ollamaModelsEl.querySelectorAll('.ollama-model-card').forEach(c => c.classList.remove('selected'));

            status.textContent = `Reading ${file.name} (${(file.size / 1e6).toFixed(1)} MB)...`;
            status.className = '';
            viz.innerHTML = '';

            try {
                const readSize = Math.min(file.size, 100 * 1024 * 1024);
                const buffer = await file.slice(0, readSize).arrayBuffer();

                status.textContent = 'Parsing GGUF header...';
                const gguf = parseGGUF(buffer);
                gguf.source = file;

                status.textContent = 'Analyzing model structure...';
                const model = analyzeModel(gguf);

                status.textContent = '';
                showModel(model);
            } catch (err) {
                status.textContent = err.message === 'Not a valid GGUF file'
                    ? 'Error: Selected file is not a valid GGUF file.'
                    : `Error: ${err.message}`;
                status.className = 'error';
                console.error(err);
            } finally {
                fileInput.value = '';
            }
        }
    </script>
</body>
</html>
